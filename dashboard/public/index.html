<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07090d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>archwes · media stack</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2358a6ff'/><stop offset='100%25' stop-color='%23a371f7'/></linearGradient></defs><text y='.88em' font-size='90' font-weight='bold' font-family='system-ui' fill='url(%23g)'>A</text></svg>">
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <!-- ── Login Overlay ── -->
  <div class="overlay" id="login-overlay">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark">A</div>
        <h2>archwes</h2>
        <p class="brand-sub">Painel de Controle</p>
      </div>
      <form id="login-form" autocomplete="off">
        <div class="field">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="login-user" placeholder="Usuário" required autocomplete="username" spellcheck="false">
        </div>
        <div class="field">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="login-pass" placeholder="Senha" required autocomplete="current-password">
        </div>
        <p class="login-error" id="login-error"></p>
        <button type="submit" class="btn-login" id="login-btn">
          <span>Entrar</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- ── Header ── -->
  <header>
    <div class="logo" id="logo-home">
      <div class="logo-mark">A</div>
      <div class="logo-text">
        <h1>archwes</h1>
        <span class="logo-sub">media stack</span>
      </div>
    </div>

    <nav id="main-nav">
      <button class="nav-btn active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-btn" data-view="panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>Painel</span>
      </button>
    </nav>

    <div class="header-right">
      <button class="refresh-btn" id="refresh-btn" title="Atualizar status">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.3"/></svg>
      </button>
      <div class="status-bar">
        <span class="status-dot" id="global-status"></span>
        <span class="status-text" id="global-status-text">Verificando...</span>
      </div>
      <button class="user-btn" id="user-btn" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Dashboard View ── -->
  <main id="view-dashboard" class="view active">
    <section id="featured-section">
      <h2 class="section-label">Principais</h2>
      <div class="grid featured-grid" id="featured-grid"></div>
    </section>
    <section id="tools-section">
      <h2 class="section-label section-label--secondary">Ferramentas</h2>
      <div class="grid tools-grid" id="tools-grid"></div>
    </section>
  </main>

  <!-- ── Control Panel View ── -->
  <main id="view-panel" class="view">
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="containers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>
        <span>Containers</span>
      </button>
      <button class="panel-tab" data-tab="logs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Logs</span>
      </button>
      <button class="panel-tab" data-tab="system">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>Sistema</span>
      </button>
      <button class="panel-tab" data-tab="config">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span>Configuração</span>
      </button>
    </div>

    <!-- Containers Tab -->
    <div class="tab-content active" id="tab-containers">
      <div class="container-grid" id="container-grid">
        <div class="loading-msg">Carregando containers...</div>
      </div>
    </div>

    <!-- Logs Tab -->
    <div class="tab-content" id="tab-logs">
      <div class="logs-toolbar">
        <select id="log-service" class="input-select">
          <option value="">Selecione um serviço...</option>
        </select>
        <select id="log-lines" class="input-select">
          <option value="50">50 linhas</option>
          <option value="100" selected>100 linhas</option>
          <option value="200">200 linhas</option>
          <option value="500">500 linhas</option>
        </select>
        <button class="btn-sm" id="log-refresh-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0118.8-4.3M22 12.5a10 10 0 01-18.8 4.3"/></svg>
          Atualizar
        </button>
      </div>
      <pre class="log-viewer" id="log-viewer">Selecione um serviço para visualizar os logs.</pre>
    </div>

    <!-- System Tab -->
    <div class="tab-content" id="tab-system">
      <div class="stats-grid" id="stats-grid">
        <div class="loading-msg">Carregando informações do sistema...</div>
      </div>
    </div>

    <!-- Config Tab -->
    <div class="tab-content" id="tab-config">
      <div class="config-header">
        <h3>docker-compose.yml</h3>
        <button class="btn-sm" id="config-copy-btn">Copiar</button>
      </div>
      <pre class="config-viewer" id="config-viewer">Carregando configuração...</pre>
    </div>
  </main>

  <footer>
    <p>crafted by <strong>archwes</strong></p>
  </footer>

  <script src="app.js?v=5"></script>
</body>
</html>
